<mat-card class="mat-elevation-z20">
    <div class="body">
        <div class="text">
            <strong>We use cookies</strong><br>
            But only for aggregate analytics consent. Filter settings,
            language, expansions, asset packs, and game helper choices are

    </mat-card-actions>
</mat-card>
